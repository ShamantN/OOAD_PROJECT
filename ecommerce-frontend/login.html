<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Nexus | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>E-Commerce Nexus</h1>
    </header>

    <div class="container auth-container">
        <div class="card auth-box">
            <!-- Login Form -->
            <div id="login-section">
                <h2 class="text-center">Welcome Back</h2>
                <div id="login-error" class="error-message"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
                    <p class="text-center mt-2">
                        Don't have an account? <a href="#" id="show-register">Register here</a>
                    </p>
                </form>
            </div>

            <!-- Registration Form -->
            <div id="register-section" style="display: none;">
                <h2 class="text-center">Create Account</h2>
                <div id="register-error" class="error-message"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="reg-role">Role</label>
                        <select id="reg-role">
                            <option value="CUSTOMER">Customer</option>
                            <option value="ADMIN">Administrator</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
                    <p class="text-center mt-2">
                        Already have an account? <a href="#" id="show-login">Sign in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Script must point to our modular JS -->
    <script src="js/auth.js"></script>
</body>
</html>
