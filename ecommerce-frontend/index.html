<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Nexus | Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .cart-badge {
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 6px;
        }
        .cart-summary {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            margin-bottom: 0.75rem;
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-CREATED    { background:#fef9c3; color:#92400e; }
        .status-PAID       { background:#dcfce7; color:#166534; }
        .status-SHIPPED    { background:#dbeafe; color:#1e3a8a; }
        .status-DELIVERED  { background:#f3f4f6; color:#374151; }
        .status-CANCELLED  { background:#fee2e2; color:#991b1b; }
    </style>
</head>
<body>
    <header>
        <h1>E-Commerce Nexus</h1>
        <nav>
            <span id="welcome-msg"></span>
            <a href="admin.html" id="admin-link" style="display:none; color:var(--primary-color); font-weight:600; margin-right:1rem;">Admin Panel</a>
            <button id="cart-btn" class="btn-outline" style="margin-right:0.5rem;">
                🛒 Cart <span class="cart-badge" id="cart-count">0</span>
            </button>
            <button id="logout-btn" class="btn-outline">Logout</button>
        </nav>
    </header>

    <div class="container">
        <div id="general-error" class="error-message"></div>
        <div id="general-success" class="success-message"></div>

        <!-- ─── Cart Drawer ─── -->
        <div id="cart-drawer" class="card" style="display:none; margin-bottom:1.5rem;">
            <h2>🛒 Your Cart</h2>
            <div id="cart-items-list"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
                <strong>Total: <span id="cart-total">$0.00</span></strong>
                <div class="flex-gap">
                    <button id="clear-cart-btn" class="btn-danger">Clear Cart</button>
                    <button id="checkout-btn" class="btn-primary">Checkout</button>
                </div>
            </div>
        </div>

        <!-- ─── Catalog ─── -->
        <section class="mb-2">
            <h2>Available Products</h2>
            <p style="color:var(--text-muted); margin-bottom:1rem;">Browse the catalog. Add items to cart, then checkout.</p>
            <div id="product-grid" class="grid grid-cols-3">
                <p>Loading catalog…</p>
            </div>
        </section>

        <hr style="margin:2rem 0; border:none; border-top:1px solid var(--border-color);">

        <!-- ─── Order History ─── -->
        <section>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h2>My Orders</h2>
                <button id="refresh-orders-btn" class="btn-outline">↻ Refresh</button>
            </div>
            <div id="orders-list"><p style="color:var(--text-muted);">No orders yet.</p></div>
        </section>
    </div>

    <script src="js/catalog.js"></script>
</body>
</html>
